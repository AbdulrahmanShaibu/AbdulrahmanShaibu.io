<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Contact Us</title>
    <link rel="stylesheet" type="text/css" href="	
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js">
	<style>
		/* Styling for the map */
		#map {
			height: 400px;
			width: 100%;
		}
		
		/* Styling for the contact form */
		form {
			max-width: 500px;
			margin: 0 auto;
            
		}
		
		label, input, textarea {
			display: block;
			margin-bottom: 10px;
		}
		
		input[type="submit"] {
			margin-top: 20px;
		}
	</style>
</head>
<body>
	<h3>Contact Us</h3>
	
	<!-- Google Maps iframe -->
	<iframe title="google map" id="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3962.8250447503366!2d106.68814711429154!3d10.801102292315105!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x317528e04c1d6a9b%3A0xb33efcfc15f06b87!2zQ2jhu6NpIFbEg24gSG_DoW5nIERhIFZpZGVvLCAxNCBUw6Jt!5e0!3m2!1sen!2s!4v1650337948766!5m2!1sen!2s" frameborder="0" allowfullscreen></iframe>
	
	<!-- Contact form -->
	<form id="contact-form">
		<label for="name">Name:</label>
		<input type="text" id="name" name="name" required>
		
		<label for="address">Address:</label>
		<input type="text" id="address" name="address" required>
		
		<label for="email">Email:</label>
		<input type="email" id="email" name="email" required>
		
		<label for="comments">Comments:</label>
		<textarea id="comments" name="comments" required></textarea>
		
		<input type="submit" value="Submit">
	</form>
	
	<script>
		// Store form data in local storage on submit
		document.getElementById("contact-form").addEventListener("submit", function(event) {
			event.preventDefault();
			
			let formData = {
				name: document.getElementById("name").value,
				address: document.getElementById("address").value,
				email: document.getElementById("email").value,
				comments: document.getElementById("comments").value
			};
			
			let storedData = JSON.parse(localStorage.getItem("contactFormData")) || [];
			storedData.push(formData);
			localStorage.setItem("contactFormData", JSON.stringify(storedData));
			
			alert("Form data has been saved!");
			document.getElementById("contact-form").reset();
		});
	</script>
</body>
</html>
