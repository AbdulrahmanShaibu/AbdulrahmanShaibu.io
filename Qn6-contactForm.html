<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* Styling for the map */
        #map {
            height: 400px;
            width: 100%;
        }

        /* Styling for the contact form */
        .contact-form {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .contact-form label {
            color: #495057;
        }

        .contact-form input, .contact-form textarea {
            border-radius: 5px;
            border-color: #ced4da;
        }

        .contact-form input[type="submit"] {
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
        }

        .contact-form input[type="submit"]:hover {
            background-color: #157347;
        }

        .contact-form textarea {
            resize: none;
        }

        .map-container {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3 class="text-center my-4">Contact Us</h3>
        
        <!-- Google Maps iframe -->
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d7933.361779739265!2d39.20594103711044!3d-6.173461358592471!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2stz!4v1683186961897!5m2!1sen!2stz" width="100%" height="500" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        
        <!-- Contact form -->
        <form id="contact-form" class="contact-form">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" id="address" name="address" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="entervalid@gmail.com" required>
            </div>
            
            <div class="mb-3">
                <label for="comments" class="form-label">Comments</label>
                <textarea id="comments" name="comments" class="form-control" rows="4" required></textarea>
            </div>
            
            <p id="submission" class="text-center"></p>
            <input type="submit" value="Submit">
        </form>
    </div>

    <script>
        // Store form data in local storage on submit
        document.getElementById("contact-form").addEventListener("submit", function(event) {
            event.preventDefault();
            
            let formData = {
                name: document.getElementById("name").value,
                address: document.getElementById("address").value,
                email: document.getElementById("email").value,
                comments: document.getElementById("comments").value
            };
            
            let storedData = JSON.parse(localStorage.getItem("contactFormData")) || [];
            storedData.push(formData);
            localStorage.setItem("contactFormData", JSON.stringify(storedData));

            alert("The form has been successfully submitted with " + formData.name + " in the " + formData.email + " account");
            
            function UserConfirmation() {
                if (confirm("Confirm")) {
                    document.querySelector("#submission").innerHTML = "Successfully confirmed";
                } else {
                    document.querySelector("#submission").innerHTML = "Cancelled";
                }
            }

            UserConfirmation();
            document.getElementById("contact-form").reset();
        });
    </script>
</body>
</html>
