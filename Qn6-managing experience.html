    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Experience</title>
        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
        <!-- Custom CSS -->
        <style>
            body {
                background-color: #f0f4f8;
                /* Very light gray */
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .container {
                background-color: #ffffff;
                /* White background */
                padding: 2rem;
                border-radius: 1rem;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                max-width: 600px;
                width: 100%;
            }

            h2 {
                text-align: center;
                color: #007bff;
                /* Bootstrap primary color */
                margin-bottom: 1.5rem;
                font-family: 'Arial', sans-serif;
                font-weight: bold;
            }

            ol {
                font-size: 1.1rem;
                color: #343a40;
                /* Dark gray */
                line-height: 1.8;
            }

            li {
                margin-bottom: 0.75rem;
                position: relative;
                padding-left: 2.5rem;
            }

            li::before {
                content: "\2022";
                /* Bullet point */
                position: absolute;
                left: 0;
                color: #007bff;
                /* Primary color for bullet */
                font-size: 1.5rem;
                top: 0;
            }

            .card {
                border: none;
                background: transparent;
            }

            .card-body {
                padding: 0;
            }

            .list-group-item {
                border-radius: 0.5rem;
                background: #e9ecef;
                /* Light gray background */
                margin-bottom: 0.5rem;
                font-size: 1.1rem;
            }

            .list-group-item:last-child {
                margin-bottom: 0;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>Managing Experience</h2>
            <div class="card">
                <div class="card-body">
                    <ol class="list-group">
                        <li class="list-group-item">Leadership</li>
                        <li class="list-group-item">Project Management</li>
                        <li class="list-group-item">Budget Management</li>
                        <li class="list-group-item">Team Building</li>
                        <li class="list-group-item">Stakeholder Management</li>
                        <li class="list-group-item">Continuous Improvement</li>
                    </ol>
                </div>
            </div>
        </div>
        <!-- Bootstrap Bundle JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    </body>

    </html>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
