<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loing</title>
    <link rel="stylesheet" type="text/css" href="	
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js">
</head>
<body>
    <div class="card text-bg-dark">
        <center>
    
        <form action="Question%206.html" id="contact-form">
        <div class="col-md-2">
        <label for="validationCustom01" class="form-label">First Name</label>
        <input type="text" class="form-control" id="validationCustom01"required>
        <div class="valid-feedback">
        </div>
      </div>
      <div class="col-md-2">
        <label for="validationCustom02" class="form-label">Last Name</label>
        <input type="text" class="form-control" id="validationCustom02" required>
        <div class="valid-feedback">
     
        </div>
      </div>
      <div class="col-md-2">
        <label  for="validationCustomUsername" class="form-label">Username</label>
        <div class="input-group has-validation">
          <span class="input-group-text" id="inputGroupPrepend"></span>
          <input id="name" name="name"  type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" placeholder="Enter Login Username" required>
          <div class="invalid-feedback">
            
          </div>
        </div>
      </div>
      <div class="col-md-2">
        <label for="validationCustom03" class="form-label">City</label>
        <input type="text" class="form-control" id="validationCustom03" required>
      
      </div>
      <div class="col-md-2">
        <label for="validationCustom04" class="form-label">State</label>
        <select class="form-select" id="address" name="address" required>
            
          <option selected disabled value="">Tanzania</option>
          <option>Kenya</option>
           <option>Russia</option>
            <option>India</option>
             <option>United State</option>
             <option>Indonesia</option>
             <option>other</option>
        </select>
      <br>  
            <textarea placeholder="Enter text here..."></textarea>
    
      <div class="col-8">
        <button   class="btn btn-info" type="submit">Login </button>
      </div>
            </form>
        </center>
    </div>
    
    
    
    <style>
      button:hover{
        border-radius: 50px;
      }
        .post{
            background-color: lightblue;
        }
      body:hover{
        background-color: rgb(73, 117, 102);
      }
      form:hover{
        background-color: rgb(77, 97, 75);
      }
      input:hover{
        border-radius: 50px;
      }
    </style>

    <script>
      alert("Welcome ,Please register from the form provided...");
      document.querySelector("#contact-form").addEventListener("submit"), function(event) {
        event.preventDefault();
        let formData = {
          name: document.querySelector("#name").value,
          address: document.querySelector("#address").value,
        };
      }    
      alert("The form has been successifully submited with"+" "+" "+formData.name); 
    </script>
</body>
</html>
