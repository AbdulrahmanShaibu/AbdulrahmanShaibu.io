<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
  <style>
    body {
      background-color: whitesmoke;
      font-family: Arial, sans-serif;
      background-image: url('https://media.istockphoto.com/id/1463013729/photo/online-registration-form-for-modish-form-filling.jpg?s=2048x2048&w=is&k=20&c=3ZAV9DqSymZphCLXFNP-2QjOlzdPyQLApCQdqKA46Zc=');
    }

    .card {
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }

    .form-control,
    .form-select {
      border-radius: 10px;
      border: 1px solid #ced4da;
      transition: border-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #80bdff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .btn {
      border-radius: 10px;
      transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
    }

    .btn-info {
      background-color: #17a2b8;
      border-color: #17a2b8;
    }

    .btn-info:hover {
      background-color: #138496;
      border-color: #117a8b;
    }

    .btn:focus,
    .btn:active {
      outline: none;
      box-shadow: none;
    }

    .form-label {
      font-weight: bold;
    }

    .valid-feedback,
    .invalid-feedback {
      display: none;
    }

    .form-control:valid~.valid-feedback {
      display: block;
      color: #28a745;
    }

    .form-control:invalid~.invalid-feedback {
      display: block;
      color: #dc3545;
    }

    .heading {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .heading h2 {
      font-size: 24px;
      font-weight: bold;
    }

    .heading h5 {
      font-size: 18px;
      font-weight: normal;
    }
  </style>
</head>

<body>
  <div class="heading">
    <h2>Developed by Abdul-rahman Shaibu</h2>
    <h5>Please fill the form to continue</h5>
  </div>
  <div class="card">
    <form action="Question%206.html" id="contact-form" novalidate>
      <div class="mb-3">
        <label for="validationCustom01" class="form-label">First Name</label>
        <input type="text" class="form-control" id="validationCustom01" required>
        <div class="valid-feedback">Looks good!</div>
        <div class="invalid-feedback">Please provide a first name.</div>
      </div>
      <div class="mb-3">
        <label for="validationCustom02" class="form-label">Last Name</label>
        <input type="text" class="form-control" id="validationCustom02" required>
        <div class="valid-feedback">Looks good!</div>
        <div class="invalid-feedback">Please provide a last name.</div>
      </div>
      <div class="mb-3">
        <label for="validationCustomUsername" class="form-label">Username</label>
        <div class="input-group has-validation">
          <input id="name" name="name" type="text" class="form-control" placeholder="Enter Login Username" required>
          <div class="valid-feedback">Looks good!</div>
          <div class="invalid-feedback">Please provide a username.</div>
        </div>
      </div>
      <div class="mb-3">
        <label for="validationCustom03" class="form-label">City</label>
        <input type="text" class="form-control" id="validationCustom03" required>
        <div class="valid-feedback">Looks good!</div>
        <div class="invalid-feedback">Please provide a city.</div>
      </div>
      <div class="mb-3">
        <label for="validationCustom04" class="form-label">State</label>
        <select class="form-select" id="address" name="address" required>
          <option selected disabled value="">Select your country</option>
          <option value="Tanzania">Tanzania</option>
          <option value="Kenya">Kenya</option>
          <option value="Russia">Russia</option>
          <option value="India">India</option>
          <option value="United States">United States</option>
          <option value="Indonesia">Indonesia</option>
          <option value="Other">Other</option>
        </select>
        <div class="valid-feedback">Looks good!</div>
        <div class="invalid-feedback">Please select a state.</div>
      </div>
      <!-- <div class="mb-3">
                <label for="textarea" class="form-label">Additional Information</label>
                <textarea class="form-control" id="textarea" rows="3" placeholder="Enter text here..."></textarea>
            </div> -->
      <button class="btn btn-info" type="submit">Register</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelector("#contact-form").addEventListener("submit", function (event) {
      event.preventDefault();

      if (this.checkValidity() === false) {
        event.stopPropagation();
        this.classList.add('was-validated');
      } else {
        let formData = {
          name: document.querySelector("#name").value,
          address: document.querySelector("#address").value,
        };
        alert("The form has been successfully submitted with " + formData.name);
        window.location.href = "Question%206.html";
      }
    });
  </script>
</body>

</html>
