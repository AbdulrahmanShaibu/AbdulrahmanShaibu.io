<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            color: #333;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            background-color: #ffffff;
            transition: 0.3s;
        }
        .card:hover {
            background-color: #e0f7fa;
            color: #00796b;
        }
        .card-content {
            text-align: left;
        }
        .table {
            border: 2px solid #00796b;
            border-collapse: collapse;
            background-color: #ffffff;
            table-layout: fixed;
            width: 100%;
        }
        thead {
            background-color: #00796b;
            color: #ffffff;
        }
        td {
            border: 1px solid #ddd;
            font-size: 1rem;
            font-weight: 500;
            padding: 12px;
        }
        td:hover {
            background-color: #e0f2f1;
        }
        h6 {
            text-align: center;
            color: #00796b;
            font-weight: 600;
        }
        .iMg {
            border-radius: 50%;
            height: 100px;
            width: 100px;
            object-fit: cover;
            border: 5px solid #00796b;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="text-center">
        <img class="iMg" id="myImage" title="Profile Image" src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8NHx8Ym9zc3xlbnwwfHwwfHw%3D&auto=format&fit=crop&w=500&q=60" alt="Profile Image">
        <h6 id="profile">Abdulrahman</h6>
    </div>
    <div class="card mt-3">
        <div class="card-body">
            <p>Touch the table to view more...</p>
            <table class="table table-hover text-center">
                <thead>
                    <tr>
                        <td><strong>First Name</strong></td>
                        <td>Abdulrahman</td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Second Name</strong></td>
                        <td>Shaibu</td>
                    </tr>
                    <tr>
                        <td><strong>Last Name</strong></td>
                        <td>Kheir</td>
                    </tr>
                    <tr>
                        <td><strong>Address</strong></td>
                        <td>Mpendae</td>
                    </tr>
                    <tr>
                        <td><strong>Location</strong></td>
                        <td>Zanzibar</td>
                    </tr>
                    <tr>
                        <td><strong>Gender</strong></td>
                        <td>Male</td>
                    </tr>
                    <tr>
                        <td><strong>Status</strong></td>
                        <td>Single</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function Owner() {
        const profile = document.querySelector('#profile');
        profile.innerHTML = (profile.innerHTML === "Abdulrahman") ? "The owner" : "Abdulrahman";
        const myImage = document.querySelector('#myImage');
        myImage.style.visibility = (myImage.style.visibility === "visible") ? "hidden" : "visible";
    }
    setInterval(Owner, 3000);
</script>

</body>
</html>
